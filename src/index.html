<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FF6B9D" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pin" />
    <meta name="description" content="Pin 拼豆创作工具 - 释放你的创意" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="<%= BASE_URL %>static/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="<%= BASE_URL %>static/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="<%= BASE_URL %>static/favicon-16x16.png" />
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="<%= BASE_URL %>static/apple-touch-icon.png" />
    
    <!-- PWA Icons -->
    <link rel="manifest" href="<%= BASE_URL %>static/manifest.json" />
    
    <title>Pin - 拼豆创作</title>
    
    <script>
      var coverSupport = 'CSS' in window && typeof CSS.supports === 'function' && (CSS.supports('top: env(a)') ||
        CSS.supports('top: constant(a)'))
      document.write(
        '<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0' +
        (coverSupport ? ', viewport-fit=cover' : '') + '" />')
    </script>
    <!--preload-links-->
    <!--app-context-->
  </head>
  <body>
    <div id="app"><!--app-html--></div>
    <script type="module" crossorigin src="./assets/index-<%= VITE_APP_VERSION %>.js"></script>
  </body>
</html>
